<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alterar Senha (Obrigatório) · ApostaE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
<link rel="canonical" href="/password-expires" />
</head>
<body>
  <div class="topbar" style="border-bottom: 3px solid var(--nao);">
    <div class="brand">ZOEIRA<span class="dot">.</span>MARKET</div>
    <div style="color: var(--nao); font-weight: 500;">⚠️ Alteração de Senha Obrigatória</div>
  </div>

  <main style="max-width: 480px;">
    <div class="page-head" style="text-align: center; padding-top: 60px;">
      <h1 style="color: var(--nao);">Senha Expirada</h1>
      <p>O administrador exigiu que você altere sua senha antes de continuar usando o sistema.</p>
    </div>

    <div class="panel">
      <div id="msgBox"></div>
      <form id="pwForm">
        <div class="field">
          <label for="newPassword">Nova Senha</label>
          <input id="newPassword" type="password" autocomplete="new-password" required minlength="6" />
        </div>
        <div class="field">
          <label for="confirmPassword">Confirmar Senha</label>
          <input id="confirmPassword" type="password" autocomplete="new-password" required minlength="6" />
        </div>
        <button class="btn-primary btn-block" type="submit">Alterar Senha</button>
      </form>
    </div>

    <div style="text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-muted);">
      Após alterar sua senha, você será redirecionado para fazer login novamente.
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/password-expires.js"></script>
</body>
</html>
